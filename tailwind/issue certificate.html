<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-gray-100">

    <p class="font-bold text-4xl p-5">
        Issue Certificate
    </p>

   
    <div class="max-w-xl mx-auto mt-20 bg-white shadow-lg border border-gray-300 p-8 rounded-lg">

        <form action="" class="space-y-6">

        
            <div>
                <p class="font-medium">Select Course*</p>
                <input class="border border-gray-500 w-full p-2 rounded" type="text">
            </div>

          
            <div>
                <p class="font-medium">Course Id*</p>
                <input class="border border-gray-500 w-full p-2 rounded" type="text">
            </div>

           
            <div>
                <p class="font-medium">Candidate Name*</p>
                <input class="border border-gray-500 w-full p-2 rounded" type="text">
            </div>

            <div>
                <label class="font-medium"><b>Select Grade *</b></label>
                <select name="grade" class="border border-gray-500 w-full p-2 rounded">
                    <option>S</option>
                    <option>A</option>
                    <option>B</option>
                    <option>C</option>
                </select>
            </div>

          
            <div>
                <label class="font-medium"><b>Issue Date *</b></label>
                <input type="date" class="border border-gray-500 w-full p-2 rounded" name="issue_date">
            </div>

        </form>
    </div>

</body>
</html>
