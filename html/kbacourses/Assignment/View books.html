<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Catalog</title>
    <link rel="stylesheet" href="./viewbooks.css">
</head>
<body>


<ul class="header">
    <li><a href="#">Home</a></li>
    <li><a href="#">Login</a></li>
    <li><a href="#">Signup</a></li>
</ul>


<div class="catalog-container">

    <div class="catalog-header">
        <h2>LIBRARY CATALOG</h2>
        <a class="add-btn" href="#">Add New Book</a>
    </div>

    
    <table class="book-table">
        <thead>
            <tr>
                <th>Cover</th>
                <th>Title</th>
                <th>Author</th>
                <th>Category</th>
                <th>Year</th>
                <th>Contact</th>
                <th>Copies</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td><img src="./the Alchemist.jpeg" width="60" height="80"></td>
                <td>The Alchemist</td>
                <td>Paulo Coelho</td>
                <td>Fiction</td>
                <td>1988</td>
                <td>+12144 2353</td>
                <td>3</td>
                <td class="buttons">
                    <button>Borrow</button>
                    <button>Details</button>
                </td>
            </tr>

            <tr>
                <td><img src="./_To Kill a Mockingbird_ - a novel by Harper Lee.jpeg" width="60" height="80"></td>
                <td>To Kill a Mockingbird</td>
                <td>Harper Lee</td>
                <td>Novel</td>
                <td>1960</td>
                <td>+121 3455677</td>
                <td>3</td>
                <td class="buttons">
                    <button>Borrow</button>
                    <button>Details</button>
                </td>
            </tr>

            <tr>
                <td><img src="Shepard Fairey _George Orwell - 1984_.jpeg" width="60" height="80"></td>
                <td>1984</td>
                <td>George Orwell</td>
                <td>Novel</td>
                <td>1949</td>
                <td>+121 3455677</td>
                <td>4</td>
                <td class="buttons">
                    <button>Borrow</button>
                    <button>Details</button>
                </td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
