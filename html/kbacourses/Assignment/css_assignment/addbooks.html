<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta-name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book</title>
    <link rel="stylesheet" href="./addbooks.css">


</head>
<body>

 
    <div class="navbar">
        <ul>
            <li><a href="./bookshome.html">Home</a></li>
            <li><a href="./View books.html">View Books</a></li>
        </ul>
    </div>

    <div class="container">
        <div class="form-box">
            <form>
                <table>
                    <tr>
                        <td>Title:</td>
                        <td><input type="text" name="title" required></td>
                    </tr>

                    <tr>
                        <td>Author:</td>
                        <td><input type="text" name="author" required></td>
                    </tr>

                    <tr>
                        <td>Contact:</td>
                        <td><input type="text" name="isbn"></td>
                    </tr>

                    <tr>
                        <td>Category:</td>
                        <td>
                            <select name="category">
                                <option>Novel</option>
                                <option>Sports</option>
                                <option>Fiction</option>
                                <option>Technology</option>
                                <option>History</option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td>Published Year:</td>
                        <td><input type="number" name="year" min="1000" max="9999"></td>
                    </tr>

                    <tr>
                        <td>Copies Available:</td>
                        <td><input type="number" name="copies" min="0" value="4"></td>
                    </tr>

                    <tr>
                        <td>Cover Image:</td>
                        <td><input type="file" name="image_src"></td>
                    </tr>

                    <tr>
                        <td>Description:</td>
                        <td><textarea name="description" rows="6"></textarea></td>
                    </tr>

                    <tr>
                        <td></td>
                        <td>
                            <input type="submit" value="Add Book">
                            <input type="reset" value="Clear">
                        </td>
                    </tr>

                </table>
            </form>
        </div>
    </div>

</body>
</html>
